name: Hiawatha Distribution Hub

on:
  schedule: [{cron: '0 2 * * *'}] # 2:00 AM UTC Daily
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # opt in before forced rollout June 2026

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sync.outputs.tag }}
      build_needed: ${{ steps.sync.outputs.build_needed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: sync
        run: |
          LATEST=$(curl -s "https://gitlab.com/api/v4/projects/hsleisink%2Fhiawatha/repository/tags" \
            | jq -r '.[0].name' | sed 's/^v//')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "ERROR: Could not fetch latest tag from GitLab" >&2
            exit 1
          fi
          if git ls-remote --tags origin | grep -q "refs/tags/v$LATEST"; then
            echo "Version v$LATEST is already built."
            echo "build_needed=false" >> $GITHUB_OUTPUT
          else
            echo "New version v$LATEST found! Initiating build sequence."
            echo "build_needed=true" >> $GITHUB_OUTPUT
            echo "tag=$LATEST" >> $GITHUB_OUTPUT
          fi

  build-debs:
    needs: check-version
    if: needs.check-version.outputs.build_needed == 'true'
    strategy:
      fail-fast: false # don't cancel other matrix legs if one distro fails
      matrix:
        # Debian Stable (trixie/debian:13) is built first and foremost.
        # Debian Old Stable (bookworm/debian:12) + all current Ubuntu LTS
        # releases are included for widest reasonable compatibility.
        # Hiawatha's minimal dependencies make multi-distro builds safe and reliable.
        # ubuntu:26.04 omitted until the image stabilises in Docker Hub.
        distro: ["debian:13", "debian:12", "ubuntu:22.04", "ubuntu:24.04"]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - name: Derive codename and update changelog
        run: |
          # Derive codename early so it's available to all subsequent steps.
          case "${{ matrix.distro }}" in
            debian:13)    CODENAME=trixie   ;;
            debian:12)    CODENAME=bookworm ;;
            ubuntu:22.04) CODENAME=jammy    ;;
            ubuntu:24.04) CODENAME=noble    ;;
            *) echo "Unknown distro: ${{ matrix.distro }}" >&2 && exit 1 ;;
          esac
          echo "CODENAME=$CODENAME" >> $GITHUB_ENV
          # Swap the distribution word on the first changelog line.
          # apt-repo-action reads this from the deb's embedded
          # changelog (/usr/share/doc/hiawatha/changelog.Debian.gz)
          # and validates it against repo_supported_version.
          sed -i "1s/unstable/$CODENAME/" debian/changelog
          echo "--- changelog line 1 after sed ---"
          head -1 debian/changelog
      - name: Build
        run: |
          # dpkg-buildpackage places output one level above the source tree.
          # Inside the container that's / (not host-accessible), so we copy
          # the finished debs back into /work (the mounted workspace) before exit.
          docker run --rm -v ${{ github.workspace }}:/work ${{ matrix.distro }} bash -c "
            set -e
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              build-essential cmake debhelper devscripts \
              libxml2-dev libxslt1-dev zlib1g-dev libmbedtls-dev
            cd /work
            dpkg-buildpackage -us -uc -b
            echo '--- debs produced ---'
            ls -lh /*.deb
            cp /*.deb /work/
          "
      - name: Verify debs landed in workspace
        run: |
          echo "--- workspace debs ---"
          ls -lh ./*.deb || { echo "ERROR: no .deb files in workspace"; exit 1; }
          dpkg-deb --info ./*.deb | grep -E 'Package|Version|Architecture'
      - name: Stage deb under codename directory
        run: |
          # Colons are illegal in artifact names, so distro string is not used directly.
          mkdir -p staging/${{ env.CODENAME }}
          mv ./*.deb staging/${{ env.CODENAME }}/
      - uses: actions/upload-artifact@v4
        with:
          # Codename in artifact name lets publish-apt download by codename glob.
          name: deb-${{ env.CODENAME }}-${{ matrix.arch }}
          path: staging/${{ env.CODENAME }}/

  publish-apt:
    needs: [check-version, build-debs]
    if: needs.check-version.outputs.build_needed == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Must stay in sync with the distro→codename mapping in build-debs above.
        codename: [trixie, bookworm, jammy, noble]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v6
      - name: Download debs for ${{ matrix.codename }}
        uses: actions/download-artifact@v4
        with:
          path: debs
          # Glob picks up both amd64 and arm64 legs for this codename.
          pattern: deb-${{ matrix.codename }}-*
          merge-multiple: true
      - name: Resolve deb paths
        id: debs
        run: |
          AMD64=$(ls debs/*_amd64.deb 2>/dev/null || true)
          ARM64=$(ls debs/*_arm64.deb 2>/dev/null || true)
          echo "amd64=$AMD64" >> $GITHUB_OUTPUT
          echo "arm64=$ARM64" >> $GITHUB_OUTPUT
          echo "--- downloaded debs ---"
          ls -lh debs/ || true
      - name: Stage git credentials for Docker action
        # The apt-repo-action container maps _github_home → /github/home (its HOME).
        # Pre-seeding the credential store lets git push without a TTY prompt.
        run: |
          GH_HOME="${RUNNER_TEMP}/_github_home"
          mkdir -p "$GH_HOME"
          git config --file "$GH_HOME/.gitconfig" credential.helper store
          printf 'https://x-access-token:%s@github.com\n' \
            "${{ secrets.GITHUB_TOKEN }}" > "$GH_HOME/.git-credentials"
          chmod 600 "$GH_HOME/.git-credentials"
      - name: Publish ${{ matrix.codename }} amd64
        if: steps.debs.outputs.amd64 != ''
        uses: MauroDruwel/apt-repo-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo_supported_version: |
            trixie
            bookworm
            jammy
            noble
          repo_supported_arch: |
            amd64
            arm64
          private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          public_key: ${{ secrets.GPG_PUBLIC_KEY }}
          file: ${{ steps.debs.outputs.amd64 }}
          file_target_version: ${{ matrix.codename }}
          target_repository: ${{ github.repository }}
      - name: Publish ${{ matrix.codename }} arm64
        if: steps.debs.outputs.arm64 != ''
        uses: MauroDruwel/apt-repo-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo_supported_version: |
            trixie
            bookworm
            jammy
            noble
          repo_supported_arch: |
            amd64
            arm64
          private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          public_key: ${{ secrets.GPG_PUBLIC_KEY }}
          file: ${{ steps.debs.outputs.arm64 }}
          file_target_version: ${{ matrix.codename }}
          target_repository: ${{ github.repository }}

  finalize:
    needs: [check-version, publish-apt]
    if: needs.check-version.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Update PKGBUILD for new version + valid checksums
        run: |
          TAG=${{ needs.check-version.outputs.tag }}
          echo "Updating PKGBUILD to v${TAG}"
          sed -i "s/^pkgver=.*/pkgver=${TAG}/" arch/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" arch/PKGBUILD
          curl -L --fail -o hiawatha.tar.gz \
            "https://gitlab.com/hsleisink/hiawatha/-/archive/v${TAG}/hiawatha-v${TAG}.tar.gz"
          SHA=$(sha256sum hiawatha.tar.gz | cut -d' ' -f1)
          sed -i "s|^sha256sums=.*|sha256sums=('${SHA}')|" arch/PKGBUILD
          rm hiawatha.tar.gz
          cat arch/PKGBUILD
      - name: Push to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: hiawatha
          pkgbuild: ./arch/PKGBUILD
          commit_username: "GitHub Actions Bot"
          commit_email: "actions@github.com"
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ needs.check-version.outputs.tag }}"
          force_push: true
      - name: Prune old versions, tag release
        run: |
          python3 .github/scripts/janitor.py
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git tag v${{ needs.check-version.outputs.tag }}
          git push origin v${{ needs.check-version.outputs.tag }}
