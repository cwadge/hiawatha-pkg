name: Hiawatha Distribution Hub

on:
  schedule: [{cron: '0 2 * * *'}] # 2:00 AM UTC Daily
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if version tag already exists (use after packaging-only changes)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # opt in before forced rollout June 2026

  # ── Fork configuration ─────────────────────────────────────────────────────
  # These are the only values that need changing when adapting this workflow
  # for a different upstream project. Everything else derives from GitHub context.
  #
  # Also update the following if your distro/arch targets differ:
  #   build-debs  matrix distro[]          Docker images for each target distro
  #   build-debs  matrix arch[]            target architectures
  #   publish-apt matrix codename[]        must mirror codenames from build-debs
  #   publish-apt repo_supported_version   must mirror the codename list
  #   publish-apt repo_supported_arch      must mirror the arch list
  # ───────────────────────────────────────────────────────────────────────────
  UPSTREAM_GITLAB_PROJECT: 'hsleisink%2Fhiawatha'  # URL-encoded, for GitLab API calls
  UPSTREAM_GITLAB_PATH: 'hsleisink/hiawatha'         # slash-separated, for git clone
  GPG_KEY_FILENAME: 'hiawatha.asc'                   # public key file in repo root
  GIT_AUTHOR_NAME: 'GitHub Actions Bot'              # identity for automated commits
  GIT_AUTHOR_EMAIL: 'actions@github.com'             # identity for automated commits

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sync.outputs.tag }}
      build_needed: ${{ steps.sync.outputs.build_needed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: sync
        run: |
          LATEST=$(curl -s "https://gitlab.com/api/v4/projects/${{ env.UPSTREAM_GITLAB_PROJECT }}/repository/tags" \
            | jq -r '.[0].name' | sed 's/^v//')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "ERROR: Could not fetch latest tag from GitLab" >&2
            exit 1
          fi
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          # force_rebuild bypasses the tag check — use after packaging-only changes
          # (e.g. adding a missing service file) where the upstream version hasn't changed.
          if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
            echo "Force rebuild requested — skipping tag check."
            echo "build_needed=true" >> $GITHUB_OUTPUT
          elif git ls-remote --tags origin | grep -q "refs/tags/v$LATEST"; then
            echo "Version v$LATEST is already built."
            echo "build_needed=false" >> $GITHUB_OUTPUT
          else
            echo "New version v$LATEST found! Initiating build sequence."
            echo "build_needed=true" >> $GITHUB_OUTPUT
          fi

  build-debs:
    needs: check-version
    if: needs.check-version.outputs.build_needed == 'true'
    strategy:
      fail-fast: false # don't cancel other matrix legs if one distro fails
      matrix:
        # Debian Stable (trixie/debian:13) is built first and foremost.
        # Debian Old Stable (bookworm/debian:12) + all current Ubuntu LTS
        # releases are included for widest reasonable compatibility.
        # Hiawatha's minimal dependencies make multi-distro builds safe and reliable.
        # ubuntu:26.04 omitted until the image stabilises in Docker Hub.
        distro: ["debian:13", "debian:12", "ubuntu:22.04", "ubuntu:24.04"]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
      - name: Derive codename and update changelog
        run: |
          case "${{ matrix.distro }}" in
            debian:13)    CODENAME=trixie;   VER_SUFFIX=~deb13u1 ;;
            debian:12)    CODENAME=bookworm; VER_SUFFIX=~deb12u1 ;;
            ubuntu:22.04) CODENAME=jammy;    VER_SUFFIX=~22.04u1 ;;
            ubuntu:24.04) CODENAME=noble;    VER_SUFFIX=~24.04u1 ;;
            *) echo "Unknown distro: ${{ matrix.distro }}" >&2 && exit 1 ;;
          esac
          echo "CODENAME=$CODENAME" >> $GITHUB_ENV
          TAG=${{ needs.check-version.outputs.tag }}
          # Determine the Debian revision. When the upstream version matches
          # what's in the changelog, preserve the existing revision so that
          # packaging-only bumps (e.g. 12.0-1 → 12.0-2 to ship a missing
          # service file) survive across builds without manual intervention.
          # When the upstream version is new, reset to 1 — the first packaging
          # of any upstream release is always -1 by convention.
          CHANGELOG_VER=$(head -1 debian/changelog | sed 's/^[^ ]* (\([^)]*\)).*/\1/')
          CHANGELOG_UPSTREAM=$(echo "$CHANGELOG_VER" | sed 's/-[0-9]*$//')
          CHANGELOG_REV=$(echo "$CHANGELOG_VER" | sed -n 's/.*-\([0-9]*\)$/\1/p')
          CHANGELOG_REV=${CHANGELOG_REV:-1}
          if [ "$CHANGELOG_UPSTREAM" = "$TAG" ]; then
            DEB_REV="$CHANGELOG_REV"
          else
            DEB_REV=1
          fi
          # Rewrite the version in the changelog header from whatever the repo
          # says to TAG-DEBREV. This makes the upstream tag the authoritative
          # version source rather than a value maintained by hand in the repo.
          sed -i "1s/([^)]*)/(${TAG}-${DEB_REV})/" debian/changelog
          # Append a distro-specific version suffix so each distro's .deb has a
          # unique filename in reprepro's shared pool. Without this, the second
          # codename to publish is rejected because its binary has a different hash
          # from the first under the same pool path — reprepro won't allow
          # hash-differing files at the same path. The ~ sorts the suffixed version
          # below the base version, the standard Debian convention for rebuilds.
          sed -i "1s/(\([^)]*\))/(\1${VER_SUFFIX})/" debian/changelog
          # Swap the distribution field. Match the full dpkg changelog header
          # pattern so a stale codename from a previous run can't silently corrupt
          # the substitution the way a bare `s/unstable/…` would (e.g. "trixieixie").
          # apt-repo-action reads this from the deb's embedded
          # changelog (/usr/share/doc/hiawatha/changelog.Debian.gz)
          # and validates it against repo_supported_version.
          sed -i "1s/) [a-z-]*;/) $CODENAME;/" debian/changelog
          echo "--- changelog line 1 after sed ---"
          head -1 debian/changelog
      - name: Fetch Hiawatha upstream source
        run: |
          # The packaging repo has debian/ but not the Hiawatha C source.
          # Download the upstream tarball and extract it into the workspace
          # so dpkg-buildpackage finds CMakeLists.txt + src/ alongside debian/.
          TAG=${{ needs.check-version.outputs.tag }}
          # GitLab archive API 404s without auth; use git clone instead.
          # All upstream tags are v-prefixed (e.g. v12.0); check-version strips
          # the v when setting the tag output, so we add it back here.
          git clone --depth=1 --branch "v${TAG}" \
            https://gitlab.com/${{ env.UPSTREAM_GITLAB_PATH }}.git /tmp/hiawatha-src
          # Merge upstream source into workspace without overwriting our debian/ packaging.
          rsync -a --exclude='.git' --exclude='debian' /tmp/hiawatha-src/ ./
          echo "--- workspace after source extraction ---"
          ls -la CMakeLists.txt src/ 2>/dev/null || echo "WARNING: CMakeLists.txt or src/ not found"
      - name: Build
        run: |
          # dpkg-buildpackage places output one level above the source tree.
          # Inside the container that's / (not host-accessible), so we copy
          # the finished debs back into /work (the mounted workspace) before exit.
          docker run --rm -v ${{ github.workspace }}:/work ${{ matrix.distro }} bash -c "
            set -e
            apt-get update -qq
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              build-essential cmake debhelper devscripts \
              libxml2-dev libxslt1-dev zlib1g-dev libmbedtls-dev
            cd /work
            dpkg-buildpackage -us -uc -b
            echo '--- debs produced ---'
            ls -lh /*.deb
            cp /*.deb /work/
          "
      - name: Verify debs landed in workspace
        run: |
          echo "--- workspace debs ---"
          ls -lh ./*.deb || { echo "ERROR: no .deb files in workspace"; exit 1; }
          # Loop over each deb individually; passing a glob to dpkg-deb --info
          # causes it to treat subsequent filenames as control component names
          # rather than additional packages, producing a spurious error.
          for deb in ./*.deb; do
            dpkg-deb --info "$deb" | grep -E 'Package|Version|Architecture|Installed-Size'
          done
          echo '--- deb contents ---'
          for deb in ./*.deb; do
            dpkg-deb --contents "$deb"
          done
      - name: Stage deb under codename directory
        run: |
          # Colons are illegal in artifact names, so distro string is not used directly.
          mkdir -p staging/${{ env.CODENAME }}
          # Stage only the main package; the dbgsym deb is excluded intentionally.
          # Including it would cause Resolve deb paths in publish-apt to produce a
          # multi-path string for a single arch, which apt-repo-action cannot handle.
          mv ./hiawatha_*.deb staging/${{ env.CODENAME }}/
      - uses: actions/upload-artifact@v4
        with:
          # Codename in artifact name lets publish-apt download by codename glob.
          name: deb-${{ env.CODENAME }}-${{ matrix.arch }}
          path: staging/${{ env.CODENAME }}/

  publish-apt:
    needs: [check-version, build-debs]
    if: needs.check-version.outputs.build_needed == 'true'
    strategy:
      fail-fast: false
      max-parallel: 1  # serialize to prevent gh-pages push conflicts between codenames
      matrix:
        # Must stay in sync with the distro→codename mapping in build-debs above.
        codename: [trixie, bookworm, jammy, noble]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v6
      - name: Download debs for ${{ matrix.codename }}
        uses: actions/download-artifact@v4
        with:
          path: debs
          # Glob picks up both amd64 and arm64 legs for this codename.
          pattern: deb-${{ matrix.codename }}-*
          merge-multiple: true
      - name: Resolve deb paths
        id: debs
        run: |
          AMD64=$(ls debs/*_amd64.deb 2>/dev/null || true)
          ARM64=$(ls debs/*_arm64.deb 2>/dev/null || true)
          echo "amd64=$AMD64" >> $GITHUB_OUTPUT
          echo "arm64=$ARM64" >> $GITHUB_OUTPUT
          echo "--- downloaded debs ---"
          ls -lh debs/ || true
      - name: Stage git credentials for Docker action
        # The apt-repo-action container mounts _github_home as /github/home.
        # Problem: docker run passes -e "HOME" with the runner's value (/home/runner),
        # which overrides the Dockerfile's ENV HOME /github/home. Git inside the
        # container then looks for credentials at /home/runner/.git-credentials,
        # a path that doesn't exist in the container — so it falls back to interactive
        # auth, which fails because there's no TTY (ENXIO: No such device or address).
        #
        # Fix: use http.extraHeader (the same mechanism actions/checkout uses) to embed
        # credentials directly in the gitconfig — no credential helper, no TTY needed.
        # GIT_CONFIG_GLOBAL propagated via GITHUB_ENV points git inside the container
        # at /github/home/.gitconfig (the container-side mount of _github_home),
        # bypassing HOME-based lookup entirely.
        run: |
          GH_HOME="${RUNNER_TEMP}/_github_home"
          mkdir -p "$GH_HOME"
          BASIC=$(printf 'x-access-token:%s' "${{ secrets.GITHUB_TOKEN }}" | base64 -w0)
          git config --file "$GH_HOME/.gitconfig" \
            http.https://github.com/.extraHeader "AUTHORIZATION: basic ${BASIC}"
          chmod 600 "$GH_HOME/.gitconfig"
          # /github/home is the container-side path; valid inside the container.
          echo "GIT_CONFIG_GLOBAL=/github/home/.gitconfig" >> "$GITHUB_ENV"
      - name: Publish ${{ matrix.codename }} amd64
        if: steps.debs.outputs.amd64 != ''
        uses: MauroDruwel/apt-repo-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo_supported_version: |
            trixie
            bookworm
            jammy
            noble
          repo_supported_arch: |
            amd64
            arm64
          private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          public_key: ${{ secrets.GPG_PUBLIC_KEY }}
          file: ${{ steps.debs.outputs.amd64 }}
          file_target_version: ${{ matrix.codename }}
          target_repository: ${{ github.repository }}
      - name: Publish ${{ matrix.codename }} arm64
        if: steps.debs.outputs.arm64 != ''
        uses: MauroDruwel/apt-repo-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          repo_supported_version: |
            trixie
            bookworm
            jammy
            noble
          repo_supported_arch: |
            amd64
            arm64
          private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          public_key: ${{ secrets.GPG_PUBLIC_KEY }}
          file: ${{ steps.debs.outputs.arm64 }}
          file_target_version: ${{ matrix.codename }}
          target_repository: ${{ github.repository }}

  finalize:
    needs: [check-version, publish-apt]
    if: needs.check-version.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure git identity
        run: |
          git config user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config user.email "${{ env.GIT_AUTHOR_EMAIL }}"
      - name: Publish static assets to gh-pages
        run: |
          TAG=${{ needs.check-version.outputs.tag }}
          # Reconstruct Debian revision using the same logic as build-debs so
          # download links in index.html point to the correct filenames.
          CHANGELOG_VER=$(head -1 debian/changelog | sed 's/^[^ ]* (\([^)]*\)).*/\1/')
          CHANGELOG_UPSTREAM=$(echo "$CHANGELOG_VER" | sed 's/-[0-9]*$//')
          CHANGELOG_REV=$(echo "$CHANGELOG_VER" | sed -n 's/.*-\([0-9]*\)$/\1/p')
          CHANGELOG_REV=${CHANGELOG_REV:-1}
          [ "$CHANGELOG_UPSTREAM" = "$TAG" ] && DEB_REV="$CHANGELOG_REV" || DEB_REV=1

          PAGES_URL="https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}"
          KEY_FILE="${{ env.GPG_KEY_FILENAME }}"

          # Generate HTML before switching branches — the script lives in main.
          export UPSTREAM_GITLAB_PATH="${{ env.UPSTREAM_GITLAB_PATH }}"
          python3 .github/scripts/gen-pages.py "$PAGES_URL" "$KEY_FILE" "$TAG" "$DEB_REV"

          cp "$KEY_FILE" /tmp/key_file_staged

          git fetch origin gh-pages
          git checkout gh-pages

          touch .nojekyll
          mkdir -p repo
          cp /tmp/key_file_staged "$KEY_FILE"
          cp /tmp/index.html index.html
          cp /tmp/repo-index.html repo/index.html

          git add .nojekyll "$KEY_FILE" index.html repo/index.html
          if ! git diff --cached --quiet; then
            git commit -m "Update static assets on gh-pages [v${TAG}-${DEB_REV}]"
            git push origin gh-pages
          fi
          git checkout main
      - name: Prune old versions, tag release
        run: |
          python3 .github/scripts/janitor.py
          TAG=v${{ needs.check-version.outputs.tag }}
          # During a force rebuild the tag already exists; skip re-tagging to
          # avoid a fatal error. A force rebuild doesn't mean a new upstream
          # release — the tag represents the upstream version, not the packaging.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists (force rebuild of existing version), skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi
